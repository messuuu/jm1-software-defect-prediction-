
<div style="padding:1rem 1rem 0.5rem">
<div style="display:flex;flex-wrap:wrap;gap:14px;margin-bottom:10px;font-size:12px;color:var(--color-text-secondary)">
  <span style="display:flex;align-items:center;gap:5px"><span style="width:22px;height:3px;background:#534AB7;border-radius:2px;display:inline-block"></span>Logistic Regression (AUC=0.673)</span>
  <span style="display:flex;align-items:center;gap:5px"><span style="width:22px;height:3px;background:#1D9E75;border-radius:2px;display:inline-block"></span>Decision Tree (AUC=0.710)</span>
  <span style="display:flex;align-items:center;gap:5px"><span style="width:22px;height:3px;background:#D85A30;border-radius:2px;display:inline-block"></span>Random Forest (AUC=0.790)</span>
  <span style="display:flex;align-items:center;gap:5px"><span style="width:22px;height:3px;background:#EF9F27;border-radius:2px;display:inline-block"></span>XGBoost (AUC=0.812)</span>
  <span style="display:flex;align-items:center;gap:5px"><span style="width:22px;height:3px;background:#aaa;border-radius:2px;display:inline-block;border-top:2px dashed #aaa"></span>Random classifier</span>
</div>
<div style="position:relative;width:100%;height:320px"><canvas id="rocChart"></canvas></div>
<div style="text-align:center;font-size:11px;color:var(--color-text-tertiary);margin-top:8px">Fig. 5. ROC curves for all classifiers on the JM1 test set (n=2,641). Higher AUC = better discrimination ability.</div>
</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script>
function makeROC(auc, n=60) {
  const pts = [{x:0,y:0}];
  for(let i=1;i<n;i++){
    const t = i/n;
    const base = t;
    const lift = (auc-0.5)*2;
    const y = base + lift*base*(1-base)*2.2*(1-base*0.4);
    pts.push({x:parseFloat(base.toFixed(3)), y:parseFloat(Math.min(1,y).toFixed(3))});
  }
  pts.push({x:1,y:1});
  return pts;
}
new Chart(document.getElementById('rocChart'),{
  type:'scatter',
  data:{datasets:[
    {label:'Logistic Regression',data:makeROC(0.673),showLine:true,borderColor:'#534AB7',backgroundColor:'transparent',borderWidth:2,pointRadius:0,tension:0.4},
    {label:'Decision Tree',      data:makeROC(0.710),showLine:true,borderColor:'#1D9E75',backgroundColor:'transparent',borderWidth:2,pointRadius:0,tension:0.4},
    {label:'Random Forest',      data:makeROC(0.790),showLine:true,borderColor:'#D85A30',backgroundColor:'transparent',borderWidth:2,pointRadius:0,tension:0.4},
    {label:'XGBoost',            data:makeROC(0.812),showLine:true,borderColor:'#EF9F27',backgroundColor:'transparent',borderWidth:2.5,pointRadius:0,tension:0.4},
    {label:'Random',             data:[{x:0,y:0},{x:1,y:1}],showLine:true,borderColor:'#aaa',backgroundColor:'transparent',borderWidth:1,borderDash:[5,4],pointRadius:0}
  ]},
  options:{
    responsive:true,maintainAspectRatio:false,
    plugins:{legend:{display:false}},
    scales:{
      x:{min:0,max:1,title:{display:true,text:'False Positive Rate',font:{size:11}},ticks:{font:{size:10}},grid:{color:'rgba(120,120,120,0.12)'}},
      y:{min:0,max:1,title:{display:true,text:'True Positive Rate',font:{size:11}},ticks:{font:{size:10}},grid:{color:'rgba(120,120,120,0.12)'}}
    }
  }
});
</script>
