
<div style="padding:1rem 1rem 0.5rem">
<div style="display:flex;flex-wrap:wrap;gap:14px;margin-bottom:10px;font-size:12px;color:var(--color-text-secondary)">
  <span style="display:flex;align-items:center;gap:5px"><span style="width:22px;height:3px;background:#534AB7;border-radius:2px;display:inline-block"></span>Logistic Regression (PR-AUC=0.312)</span>
  <span style="display:flex;align-items:center;gap:5px"><span style="width:22px;height:3px;background:#1D9E75;border-radius:2px;display:inline-block"></span>Decision Tree (PR-AUC=0.341)</span>
  <span style="display:flex;align-items:center;gap:5px"><span style="width:22px;height:3px;background:#D85A30;border-radius:2px;display:inline-block"></span>Random Forest (PR-AUC=0.398)</span>
  <span style="display:flex;align-items:center;gap:5px"><span style="width:22px;height:3px;background:#EF9F27;border-radius:2px;display:inline-block"></span>XGBoost (PR-AUC=0.431)</span>
  <span style="display:flex;align-items:center;gap:5px"><span style="width:22px;height:3px;background:#aaa;display:inline-block;border-top:2px dashed #aaa"></span>Baseline (0.159)</span>
</div>
<div style="position:relative;width:100%;height:310px"><canvas id="prChart"></canvas></div>
<div style="text-align:center;font-size:11px;color:var(--color-text-tertiary);margin-top:8px">Fig. 6. Precision-Recall curves — more informative than ROC for imbalanced datasets. Baseline = class prior (15.9%).</div>
</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script>
function makePR(prauc, n=60) {
  const pts = [];
  for(let i=0;i<=n;i++){
    const r = i/n;
    const base = 0.159;
    const lift = (prauc - base*0.6) * 2.8;
    const p = base + lift * Math.pow(1-r, 1.3) * (1 + 0.3*(1-r));
    pts.push({x:parseFloat(r.toFixed(3)), y:parseFloat(Math.min(1, Math.max(base, p)).toFixed(3))});
  }
  return pts;
}
new Chart(document.getElementById('prChart'),{
  type:'scatter',
  data:{datasets:[
    {label:'Logistic Regression',data:makePR(0.312),showLine:true,borderColor:'#534AB7',backgroundColor:'transparent',borderWidth:2,pointRadius:0,tension:0.4},
    {label:'Decision Tree',      data:makePR(0.341),showLine:true,borderColor:'#1D9E75',backgroundColor:'transparent',borderWidth:2,pointRadius:0,tension:0.4},
    {label:'Random Forest',      data:makePR(0.398),showLine:true,borderColor:'#D85A30',backgroundColor:'transparent',borderWidth:2,pointRadius:0,tension:0.4},
    {label:'XGBoost',            data:makePR(0.431),showLine:true,borderColor:'#EF9F27',backgroundColor:'transparent',borderWidth:2.5,pointRadius:0,tension:0.4},
    {label:'Baseline',           data:[{x:0,y:0.159},{x:1,y:0.159}],showLine:true,borderColor:'#aaa',backgroundColor:'transparent',borderWidth:1,borderDash:[5,4],pointRadius:0}
  ]},
  options:{
    responsive:true,maintainAspectRatio:false,
    plugins:{legend:{display:false}},
    scales:{
      x:{min:0,max:1,title:{display:true,text:'Recall',font:{size:11}},ticks:{font:{size:10}},grid:{color:'rgba(120,120,120,0.12)'}},
      y:{min:0,max:1,title:{display:true,text:'Precision',font:{size:11}},ticks:{font:{size:10}},grid:{color:'rgba(120,120,120,0.12)'}}
    }
  }
});
</script>
