
<div style="padding:1rem 1rem 0.5rem">
<div style="display:flex;gap:14px;margin-bottom:10px;font-size:12px;color:var(--color-text-secondary)">
  <span style="display:flex;align-items:center;gap:5px"><span style="width:10px;height:10px;border-radius:2px;background:#378ADD;display:inline-block"></span>Strong predictor (r &gt; 0.18)</span>
  <span style="display:flex;align-items:center;gap:5px"><span style="width:10px;height:10px;border-radius:2px;background:#B4B2A9;display:inline-block"></span>Weak predictor</span>
</div>
<div style="position:relative;width:100%;height:360px"><canvas id="corrChart"></canvas></div>
<div style="text-align:center;font-size:11px;color:var(--color-text-tertiary);margin-top:8px">Fig. 8. Pearson correlation (absolute value) of each feature with the defects target variable. loc and branchCount are strongest predictors.</div>
</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script>
const feats = ['lOComment','lOBlank','locCodeAndComment','b','l','lOCode','ev(g)','uniq_Op','iv(g)','v(g)','i','e','uniq_Opnd','total_Op','total_Opnd','n','branchCount','loc'];
const vals  = [0.031,0.052,0.053,0.059,0.071,0.085,0.109,0.121,0.134,0.138,0.142,0.147,0.162,0.179,0.188,0.198,0.217,0.243];
const cols  = vals.map(v=>v>=0.18?'#378ADDcc':'#B4B2A9cc');
const bords = vals.map(v=>v>=0.18?'#378ADD':'#B4B2A9');
new Chart(document.getElementById('corrChart'),{
  type:'bar',
  data:{labels:feats,datasets:[{data:vals,backgroundColor:cols,borderColor:bords,borderWidth:1}]},
  options:{
    indexAxis:'y',responsive:true,maintainAspectRatio:false,
    plugins:{legend:{display:false}},
    scales:{
      x:{title:{display:true,text:'|Pearson r| with defects',font:{size:11}},ticks:{callback:v=>v.toFixed(2),font:{size:10}},grid:{color:'rgba(120,120,120,0.12)'}},
      y:{ticks:{font:{size:11}},grid:{display:false}}
    }
  }
});
</script>
